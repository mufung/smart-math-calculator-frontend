<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HighupWeb Academy | Math AI Assistant</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="background-overlay"></div>
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo-section">
      <h2>HIGHUPWEB</h2>
      <span>Academy AI</span>
    </div>

    <button class="new-chat-btn" onclick="startNewChat()">
      + New Chat
    </button>

    <div class="chat-history-section">
      <p class="chat-history-title">Recent Chats</p>
      <ul id="chatList"></ul>
    </div>

    <nav>
      <ul>
        <li>Analytics</li>
        <li>Students</li>
        <li>Admin</li>
      </ul>
    </nav>

    <div class="theme-toggle">
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
      <p>Light Mode</p>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <h1>Math AI Assistant</h1>
      <p>Project MXP &bull; HighupWeb Academy &bull; Cameroon</p>
    </header>

    <div class="app">
      <div id="chatContainer"></div>
      <div class="inputArea">
        <input id="messageInput" placeholder="Ask any math question..." autocomplete="off"/>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

</div>

<script src="app.js"></script>
<script>
document.getElementById("themeToggle").addEventListener("change", () => {
    document.body.classList.toggle("light-mode");
});
document.getElementById("sendBtn").addEventListener("click", sendMessage);
document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>
</body>
</html>
