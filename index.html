<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HighupWeb Academy | Math AI Assistant</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" crossorigin="anonymous"/>
</head>
<body>

<div class="background-overlay"></div>
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo-section">
      <h2>HIGHUPWEB</h2>
      <span>Academy AI</span>
    </div>

    <button class="new-chat-btn" onclick="startNewChat()">
      + New Chat
    </button>

    <div class="chat-history-section">
      <p class="chat-history-title">Recent Chats</p>
      <ul id="chatList"></ul>
    </div>

    <nav>
      <ul>
        <li>📊 Analytics</li>
        <li>👨‍🎓 Students</li>
        <li>⚙️ Admin</li>
      </ul>
    </nav>

    <div class="theme-toggle">
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
      <p>Light Mode</p>
    </div>
  </aside>

  <!-- ── MAIN ───────────────────────────────────────────── -->
  <div class="main">

    <header class="topbar">
      <div class="topbar-left">
        <h1>Math AI Assistant</h1>
        <p>Project MXP &bull; HighupWeb Academy &bull; Cameroon</p>
      </div>
      <div class="topbar-right">
        <span class="status-badge">🟢 Online</span>
      </div>
    </header>

    <!-- ── VOICE CONTROL BAR ──────────────────────────── -->
    <div class="voice-bar" id="voiceBar">
      <div class="voice-bar-left">
        <button id="voiceToggleBtn" class="voice-toggle-btn" onclick="toggleVoice()">
          🔊 Voice On
        </button>
        <div id="voiceIndicator" class="voice-indicator">
          🔊 Ready
        </div>
      </div>

      <div class="voice-controls" id="voiceControls">
        <button id="voicePlayBtn"  class="voice-btn" onclick="replayLastMessage()" title="Replay last message">▶️ Replay</button>
        <button id="voicePauseBtn" class="voice-btn" onclick="VoiceState.paused ? resumeSpeaking() : pauseSpeaking()" title="Pause/Resume" disabled>⏸️ Pause</button>
        <button id="voiceStopBtn"  class="voice-btn" onclick="stopSpeaking()" title="Stop speaking" disabled>⏹️ Stop</button>
      </div>

      <div class="voice-settings">
        <!-- Volume -->
        <div class="voice-setting-group">
          <label>🔈 <span id="volumeLabel">90%</span></label>
          <input
            type="range" min="0" max="1" step="0.1" value="0.9"
            class="voice-slider"
            oninput="setVolume(this.value)"
          />
        </div>

        <!-- Speed -->
        <div class="voice-setting-group">
          <label>⚡ <span id="speedLabel">Normal</span></label>
          <select class="voice-select-small" onchange="setSpeed(this.value)">
            <option value="0.7">Slow</option>
            <option value="0.95" selected>Normal</option>
            <option value="1.3">Fast</option>
            <option value="1.6">Very Fast</option>
          </select>
        </div>

        <!-- Voice selector -->
        <div class="voice-setting-group">
          <label>🎙️</label>
          <select id="voiceSelector" class="voice-select-small" onchange="setVoice(this.value)">
            <option value="-1">Auto</option>
          </select>
        </div>
      </div>
    </div>

    <div class="app">
      <div id="chatContainer"></div>

      <!-- Quick replies -->
      <div id="quickReplies" class="quick-replies hidden">
        <button onclick="quickReply('Yes, I understand! ✅')"           class="qr-btn qr-yes">✅ I understand!</button>
        <button onclick="quickReply('No, please explain more 🔄')"      class="qr-btn qr-no">🔄 Explain more</button>
        <button onclick="quickReply('Can you give me another example?')" class="qr-btn qr-example">📝 More examples</button>
        <button onclick="quickReply('Why do we do this step?')"          class="qr-btn qr-why">💡 Why this step?</button>
      </div>

      <div class="inputArea">
        <button class="mic-btn" id="micBtn" title="Voice input — Path 7">🎤</button>
        <input
          id="messageInput"
          placeholder="Ask any math question..."
          autocomplete="off"
        />
        <button id="sendBtn">Send ➤</button>
      </div>

      <div class="input-hint">
        Try: "solve x² + 5x + 6 = 0" &bull; "plot sin(x)" &bull; "explain integration"
      </div>
    </div>
  </div>
</div>

<!-- ── SCRIPTS ─────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" crossorigin="anonymous" defer></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" crossorigin="anonymous" defer onload="onKatexLoaded()"></script>

<!-- Our files — ORDER MATTERS -->
<script src="conversation.js"></script>
<script src="voice.js"></script>
<script src="renderer.js"></script>
<script src="math-renderer.js"></script>
<script src="app.js"></script>

<script>
function onKatexLoaded() {
    console.log("KaTeX loaded");
    renderAllMathInPage();
}

document.getElementById("themeToggle").addEventListener("change", () => {
    document.body.classList.toggle("light-mode");
});

document.getElementById("sendBtn").addEventListener("click", sendMessage);

document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
});

// Mic button — will be activated in Path 7
document.getElementById("micBtn").addEventListener("click", () => {
    addMathMarkdownMessage("🎤 **Voice input** coming in Path 7!");
});
</script>

</body>
</html>
