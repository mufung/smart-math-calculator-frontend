 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HighupWeb Academy | Math AI Assistant</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" crossorigin="anonymous"/>
</head>
<body>

<div class="background-overlay"></div>
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo-section">
      <h2>HIGHUPWEB</h2>
      <span>Academy AI</span>
    </div>

    <button class="new-chat-btn" onclick="startNewChat()">
      + New Chat
    </button>

    <div class="chat-history-section">
      <p class="chat-history-title">Recent Chats</p>
      <ul id="chatList"></ul>
    </div>

    <nav>
      <ul>
        <li>📊 Analytics</li>
        <li>👨‍🎓 Students</li>
        <li>⚙️ Admin</li>
      </ul>
    </nav>

    <div class="theme-toggle">
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
      <p>Light Mode</p>
    </div>
  </aside>

  <!-- ── MAIN ───────────────────────────────────────────── -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Math AI Assistant</h1>
        <p>Project MXP &bull; HighupWeb Academy &bull; Cameroon</p>
      </div>
      <div class="topbar-right">
        <span class="status-badge">🟢 Online</span>
      </div>
    </header>

    <div class="app">
      <div id="chatContainer"></div>

      <!-- Quick reply buttons -->
      <div id="quickReplies" class="quick-replies hidden">
        <button onclick="quickReply('Yes, I understand! ✅')"           class="qr-btn qr-yes">✅ I understand!</button>
        <button onclick="quickReply('No, please explain more 🔄')"      class="qr-btn qr-no">🔄 Explain more</button>
        <button onclick="quickReply('Can you give me another example?')" class="qr-btn qr-example">📝 More examples</button>
        <button onclick="quickReply('Why do we do this step?')"          class="qr-btn qr-why">💡 Why this step?</button>
      </div>

      <div class="inputArea">
        <button class="mic-btn" id="micBtn" title="Voice input — Path 8">🎤</button>
        <input
          id="messageInput"
          placeholder="Ask any math question..."
          autocomplete="off"
        />
        <button id="sendBtn">Send ➤</button>
      </div>

      <div class="input-hint">
        Try: "solve x² + 5x + 6 = 0" &bull; "plot sin(x)" &bull; "what is 15% of 200"
      </div>
    </div>
  </div>
</div>

<!-- ── SCRIPTS ────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js" crossorigin="anonymous" defer></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js" crossorigin="anonymous" defer onload="onKatexLoaded()"></script>

<!-- Our files — ORDER MATTERS -->
<script src="conversation.js"></script>
<script src="renderer.js"></script>
<script src="math-renderer.js"></script>
<script src="app.js"></script>

<script>
function onKatexLoaded() {
    console.log("KaTeX loaded");
    renderAllMathInPage();
}

document.getElementById("themeToggle").addEventListener("change", () => {
    document.body.classList.toggle("light-mode");
});

document.getElementById("sendBtn").addEventListener("click", sendMessage);

document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
});

document.getElementById("micBtn").addEventListener("click", () => {
    addMathMarkdownMessage("🎤 **Voice input** will be enabled in Path 8!");
});
</script>

</body>
</html>
