<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HighupWeb Academy | Math AI Assistant</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js for graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>

<!-- DOMPurify for safe HTML sanitization -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

</head>
<body>
<div class="background-overlay"></div>
<div class="layout">

  <!-- ── SIDEBAR ─────────────────────────────────────────── -->
  <aside class="sidebar">

    <div class="logo-section">
      <h2>HIGHUPWEB</h2>
      <span>Academy AI</span>
    </div>

    <button class="new-chat-btn" onclick="startNewChat()">
      + New Chat
    </button>

    <div class="chat-history-section">
      <p class="chat-history-title">Recent Chats</p>
      <ul id="chatList"></ul>
    </div>

    <nav>
      <ul>
        <li>📊 Analytics</li>
        <li>👨‍🎓 Students</li>
        <li>⚙️ Admin</li>
      </ul>
    </nav>

    <div class="theme-toggle">
      <label class="switch">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
      <p>Light Mode</p>
    </div>

  </aside>

  <!-- ── MAIN AREA ───────────────────────────────────────── -->
  <div class="main">

    <header class="topbar">
      <div class="topbar-left">
        <h1>Math AI Assistant</h1>
        <p>Project MXP &bull; HighupWeb Academy &bull; Cameroon</p>
      </div>
      <div class="topbar-right">
        <span class="status-badge">🟢 Online</span>
      </div>
    </header>

    <div class="app">
      <div id="chatContainer"></div>

      <div class="inputArea">
        <button class="mic-btn" id="micBtn" title="Voice input (coming soon)">🎤</button>
        <input
          id="messageInput"
          placeholder="Ask any math question..."
          autocomplete="off"
        />
        <button id="sendBtn">Send ➤</button>
      </div>

      <div class="input-hint">
        Try: "solve x² + 5x + 6 = 0" • "plot sin(x)" • "draw a hexagon"
      </div>
    </div>

  </div>

</div>

<!-- Load renderer first, then app logic -->
<script src="renderer.js"></script>
<script src="app.js"></script>

<script>
// ── EVENT LISTENERS ──────────────────────────────────────────
document.getElementById("themeToggle").addEventListener("change", () => {
    document.body.classList.toggle("light-mode");
});

document.getElementById("sendBtn").addEventListener("click", sendMessage);

document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
});

// Mic button placeholder (Path 8 will activate this)
document.getElementById("micBtn").addEventListener("click", () => {
    addMarkdownMessage("🎤 **Voice input coming soon!** This feature will be enabled in a future update.");
});
</script>
</body>
</html>
